<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodlama Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c2c 0%, #2a4a35 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .header p {
            color: #c8e6d9;
            font-style: italic;
            margin-top: 10px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #2c5a3e;
            color: #ffd700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .nav-btn.active {
            background: #ffd700;
            color: #1e3c2c;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            background: #ffd700;
            color: #1e3c2c;
        }

        .page {
            display: none;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1e3c2c;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        button {
            background: #2c5a3e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #1e3c2c;
            transform: scale(1.02);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2c5a3e;
            color: #ffd700;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters select, .filters input {
            width: auto;
            min-width: 150px;
        }

        .export-btn {
            background: #28a745;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .nav-btn {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kodlama Sistemi</h1>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn active" data-page="list">📋 Liste Görünümü</button>
            <button class="nav-btn" data-page="add">➕ Ekleme Paneli</button>
        </div>

        <!-- LİSTE SAYFASI -->
        <div id="list-page" class="page active">
            <div class="filters">
                <select id="list-type">
                    <option value="vilayet">🏛️ Vilayetler</option>
                    <option value="il">🏙️ İller</option>
                    <option value="tax">🏘️ Tax'lar (Mahalleler)</option>
                </select>
                <input type="text" id="search-input" placeholder="🔍 Arama..." style="width: 200px;">
                <button id="export-csv" class="export-btn">📥 CSV Dışa Aktar</button>
            </div>
            <div class="table-container" id="list-table-container"></div>
        </div>

        <!-- EKLEME SAYFASI -->
        <div id="add-page" class="page">
            <h2 style="color:#1e3c2c; margin-bottom:20px;">➕ Yeni Kayıt Ekle</h2>
            
            <!-- Vilayet Ekleme -->
            <div style="background:#e8f5e9; padding:20px; border-radius:15px; margin-bottom:25px;">
                <h3>🏛️ Yeni Vilayet (Eyalet) Ekle</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Vilayet Adı</label>
                        <input type="text" id="vilayet-name" placeholder="Örn: ARCADIA">
                    </div>
                    <div class="form-group">
                        <label>Vilayet Kodu (2 haneli sayı)</label>
                        <input type="text" id="vilayet-code" placeholder="Örn: 01" maxlength="2">
                    </div>
                </div>
                <div class="form-group">
                    <label>Vilayet Hakkında (Açıklama)</label>
                    <textarea id="vilayet-desc" placeholder="Bu vilayetin özellikleri, tarihi, kültürü..."></textarea>
                </div>
                <button id="add-vilayet-btn">🏛️ Vilayet Ekle</button>
            </div>

            <!-- İl Ekleme -->
            <div style="background:#fff3e0; padding:20px; border-radius:15px; margin-bottom:25px;">
                <h3>🏙️ Yeni İl Ekle</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Bağlı Vilayet</label>
                        <select id="il-vilayet-select"></select>
                    </div>
                    <div class="form-group">
                        <label>İl Adı</label>
                        <input type="text" id="il-name" placeholder="Örn: ATHENAE">
                    </div>
                </div>
                <button id="add-il-btn">🏙️ İl Ekle (Otomatik Kod)</button>
                <small style="display:block; margin-top:10px; color:#666;">✅ İl adına göre 3 harflik otomatik kod atanır. Çakışma varsa son harf değiştirilir.</small>
            </div>

            <!-- Tax Ekleme -->
            <div style="background:#e3f2fd; padding:20px; border-radius:15px;">
                <h3>🏘️ Yeni Tax (Mahalle) Ekle</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Bağlı Vilayet</label>
                        <select id="tax-vilayet-select">
                            <option value="">-- Vilayet Seç --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bağlı İl</label>
                        <select id="tax-il-select" disabled>
                            <option value="">Önce vilayet seçin</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tax (Mahalle) Adı</label>
                    <input type="text" id="tax-name" placeholder="Örn: AGORA">
                </div>
                <button id="add-tax-btn">🏘️ Tax Ekle (Otomatik 2 Harfli Kod)</button>
                <small style="display:block; margin-top:10px; color:#666;">✅ Tax adına göre 2 harflik otomatik kod atanır.</small>
            </div>
        </div>
    </div>

    <script>
        // Veri Yapıları
        let vilayets = JSON.parse(localStorage.getItem('vilayets')) || [];
        let ills = JSON.parse(localStorage.getItem('ills')) || [];
        let taxes = JSON.parse(localStorage.getItem('taxes')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('vilayets', JSON.stringify(vilayets));
            localStorage.setItem('ills', JSON.stringify(ills));
            localStorage.setItem('taxes', JSON.stringify(taxes));
        }

        function normalizeText(text) {
            const map = {
                'Ç': 'C', 'ç': 'C', 'Ğ': 'G', 'ğ': 'G',
                'İ': 'I', 'i': 'I', 'Ö': 'O', 'ö': 'O',
                'Ş': 'S', 'ş': 'S', 'Ü': 'U', 'ü': 'U',
                'Â': 'A', 'â': 'A', 'Û': 'U', 'û': 'U'
            };
            return text.toUpperCase().split('').map(char => map[char] || char).join('');
        }

        function generateIlCode(ilName, vilayetId) {
            let normalized = normalizeText(ilName);
            let consonants = normalized.split('').filter(c => !'AEIOU'.includes(c));
            
            let baseCode = '';
            if (consonants.length >= 3) {
                baseCode = consonants[0] + consonants[1] + consonants[2];
            } else if (consonants.length === 2) {
                baseCode = consonants[0] + consonants[1] + (normalized[0] || 'X');
            } else if (consonants.length === 1) {
                baseCode = consonants[0] + (normalized[1] || 'X') + (normalized[2] || 'X');
            } else {
                baseCode = normalized.substring(0, 3);
                while(baseCode.length < 3) baseCode += 'X';
            }

            let existingCodes = ills.filter(i => i.vilayetId === vilayetId).map(i => i.code);
            let finalCode = baseCode;
            let counter = 1;
            
            while (existingCodes.includes(finalCode)) {
                let lastChar = finalCode[2];
                let newLastChar = String.fromCharCode(lastChar.charCodeAt(0) + counter);
                if (newLastChar > 'Z') newLastChar = 'A';
                finalCode = finalCode.substring(0, 2) + newLastChar;
                counter++;
                if (counter > 26) break;
            }
            return finalCode;
        }

        function generateTaxCode(taxName) {
            let normalized = normalizeText(taxName);
            let consonants = normalized.split('').filter(c => !'AEIOU'.includes(c));
            
            if (consonants.length >= 2) {
                return consonants[0] + consonants[1];
            } else if (consonants.length === 1) {
                return consonants[0] + (normalized[1] || 'X');
            } else {
                return normalized.substring(0, 2);
            }
        }

        // İl dropdown'ını güncelle (sadece tax için)
        function updateIlDropdown() {
            const taxVilayetSelect = document.getElementById('tax-vilayet-select');
            const taxIlSelect = document.getElementById('tax-il-select');
            
            if (!taxVilayetSelect || !taxIlSelect) return;
            
            const selectedVilayetId = taxVilayetSelect.value;
            
            if (selectedVilayetId) {
                const filteredIller = ills.filter(i => i.vilayetId == selectedVilayetId);
                if (filteredIller.length > 0) {
                    taxIlSelect.innerHTML = '<option value="">-- İl Seç --</option>' + 
                        filteredIller.map(i => `<option value="${i.id}">${i.name} (${i.code})</option>`).join('');
                    taxIlSelect.disabled = false;
                } else {
                    taxIlSelect.innerHTML = '<option value="">Bu vilayette henüz il yok</option>';
                    taxIlSelect.disabled = true;
                }
            } else {
                taxIlSelect.innerHTML = '<option value="">Önce vilayet seçin</option>';
                taxIlSelect.disabled = true;
            }
        }

        // Tüm dropdownları güncelle (vilayet listeleri)
        function updateVilayetDropdowns() {
            const vilayetSelects = ['il-vilayet-select', 'tax-vilayet-select'];
            const currentValues = {};
            
            // Mevcut seçili değerleri sakla
            vilayetSelects.forEach(id => {
                const select = document.getElementById(id);
                if (select) currentValues[id] = select.value;
            });
            
            // Vilayet dropdownlarını yeniden doldur
            vilayetSelects.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">-- Vilayet Seç --</option>' + 
                        vilayets.map(v => `<option value="${v.id}">${v.name} (${v.code})</option>`).join('');
                    
                    // Önceki seçili değeri geri yükle
                    if (currentValues[id] && vilayets.some(v => v.id == currentValues[id])) {
                        select.value = currentValues[id];
                    }
                }
            });
            
            // Tax il dropdown'ını güncelle
            updateIlDropdown();
        }

        // Tüm UI'ı güncelle
        function refreshUI() {
            updateVilayetDropdowns();
            renderList();
        }

        function renderList() {
            const type = document.getElementById('list-type').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('list-table-container');
            
            if (type === 'vilayet') {
                let filtered = vilayets.filter(v => v.name.toLowerCase().includes(search) || v.code.includes(search));
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Vilayet Adı</th><th>Kod</th><th>Açıklama</th><th>İşlemler</th></tr>
                        </thead>
                        <tbody>
                            ${filtered.map(v => `
                                <tr>
                                    <td>${v.id}</td>
                                    <td><strong>${v.name}</strong></td>
                                    <td>🏛️ ${v.code}</td>
                                    <td>${v.description || '-'}</td>
                                    <td class="action-buttons">
                                        <button class="delete-vilayet" data-id="${v.id}">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } 
            else if (type === 'il') {
                let filtered = ills.filter(i => i.name.toLowerCase().includes(search) || i.code.includes(search));
                filtered = filtered.map(i => ({...i, vilayetName: vilayets.find(v => v.id == i.vilayetId)?.name || '?'}));
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Vilayet</th><th>İl Adı</th><th>Kod</th><th>İşlemler</th></tr>
                        </thead>
                        <tbody>
                            ${filtered.map(i => `
                                <tr>
                                    <td>${i.id}</td>
                                    <td>🏛️ ${i.vilayetName}</td>
                                    <td><strong>${i.name}</strong></td>
                                    <td>🏙️ ${i.code}</td>
                                    <td class="action-buttons">
                                        <button class="delete-il" data-id="${i.id}">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
            else if (type === 'tax') {
                let filtered = taxes.filter(t => t.name.toLowerCase().includes(search) || t.code.includes(search));
                filtered = filtered.map(t => ({
                    ...t,
                    vilayetName: vilayets.find(v => v.id == t.vilayetId)?.name || '?',
                    ilName: ills.find(i => i.id == t.ilId)?.name || '?'
                }));
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Vilayet</th><th>İl</th><th>Tax Adı</th><th>Kod</th><th>İşlemler</th></tr>
                        </thead>
                        <tbody>
                            ${filtered.map(t => `
                                <tr>
                                    <td>${t.id}</td>
                                    <td>🏛️ ${t.vilayetName}</td>
                                    <td>🏙️ ${t.ilName}</td>
                                    <td><strong>${t.name}</strong></td>
                                    <td>🏘️ ${t.code}</td>
                                    <td class="action-buttons">
                                        <button class="delete-tax" data-id="${t.id}">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            // Silme eventleri
            document.querySelectorAll('.delete-vilayet').forEach(btn => {
                btn.onclick = () => {
                    if(confirm('Vilayet ve bağlı tüm iller/taxlar silinecek!')) {
                        let id = parseInt(btn.dataset.id);
                        vilayets = vilayets.filter(v => v.id !== id);
                        ills = ills.filter(i => i.vilayetId !== id);
                        taxes = taxes.filter(t => t.vilayetId !== id);
                        saveToLocalStorage();
                        refreshUI();
                    }
                };
            });
            
            document.querySelectorAll('.delete-il').forEach(btn => {
                btn.onclick = () => {
                    if(confirm('İl ve bağlı tüm taxlar silinecek!')) {
                        let id = parseInt(btn.dataset.id);
                        ills = ills.filter(i => i.id !== id);
                        taxes = taxes.filter(t => t.ilId !== id);
                        saveToLocalStorage();
                        refreshUI();
                    }
                };
            });
            
            document.querySelectorAll('.delete-tax').forEach(btn => {
                btn.onclick = () => {
                    if(confirm('Tax silinecek!')) {
                        let id = parseInt(btn.dataset.id);
                        taxes = taxes.filter(t => t.id !== id);
                        saveToLocalStorage();
                        renderList();
                    }
                };
            });
        }

        function exportToCSV() {
            const type = document.getElementById('list-type').value;
            let data = [];
            let headers = [];
            
            if (type === 'vilayet') {
                headers = ['ID', 'Vilayet Adı', 'Kod', 'Açıklama'];
                data = vilayets.map(v => [v.id, v.name, v.code, v.description]);
            } else if (type === 'il') {
                headers = ['ID', 'Vilayet', 'İl Adı', 'Kod'];
                data = ills.map(i => {
                    let vName = vilayets.find(v => v.id == i.vilayetId)?.name || '';
                    return [i.id, vName, i.name, i.code];
                });
            } else {
                headers = ['ID', 'Vilayet', 'İl', 'Tax Adı', 'Kod'];
                data = taxes.map(t => {
                    let vName = vilayets.find(v => v.id == t.vilayetId)?.name || '';
                    let iName = ills.find(i => i.id == t.ilId)?.name || '';
                    return [t.id, vName, iName, t.name, t.code];
                });
            }
            
            let csvContent = headers.join(',') + '\n' + data.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `hayali_ulke_${type}.csv`;
            link.click();
        }

        function initNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(`${btn.dataset.page}-page`).classList.add('active');
                    if (btn.dataset.page === 'list') renderList();
                    else refreshUI();
                };
            });
        }

        function initAddButtons() {
            document.getElementById('add-vilayet-btn').onclick = () => {
                let name = document.getElementById('vilayet-name').value.trim();
                let code = document.getElementById('vilayet-code').value.trim();
                let desc = document.getElementById('vilayet-desc').value.trim();
                if (!name || !code) return alert('Vilayet adı ve kodu gerekli!');
                let newId = Date.now();
                vilayets.push({ id: newId, name, code, description: desc });
                saveToLocalStorage();
                refreshUI();
                document.getElementById('vilayet-name').value = '';
                document.getElementById('vilayet-code').value = '';
                document.getElementById('vilayet-desc').value = '';
                alert('Vilayet eklendi!');
            };
            
            document.getElementById('add-il-btn').onclick = () => {
                let vilayetId = document.getElementById('il-vilayet-select').value;
                let name = document.getElementById('il-name').value.trim();
                if (!vilayetId || !name) return alert('Vilayet ve il adı gerekli!');
                let code = generateIlCode(name, parseInt(vilayetId));
                let newId = Date.now();
                ills.push({ id: newId, vilayetId: parseInt(vilayetId), name, code });
                saveToLocalStorage();
                refreshUI();
                document.getElementById('il-name').value = '';
                alert(`İl eklendi! Kod: ${code}`);
            };
            
            document.getElementById('add-tax-btn').onclick = () => {
                let vilayetId = document.getElementById('tax-vilayet-select').value;
                let ilId = document.getElementById('tax-il-select').value;
                let name = document.getElementById('tax-name').value.trim();
                if (!vilayetId || !ilId || !name) return alert('Vilayet, il ve tax adı gerekli!');
                let code = generateTaxCode(name);
                let newId = Date.now();
                taxes.push({ id: newId, vilayetId: parseInt(vilayetId), ilId: parseInt(ilId), name, code });
                saveToLocalStorage();
                document.getElementById('tax-name').value = '';
                alert(`Tax eklendi! Kod: ${code}`);
            };
            
            // Vilayet değiştiğinde il dropdown'ını güncelle
            document.getElementById('tax-vilayet-select').onchange = () => updateIlDropdown();
        }

        // Başlat
        initNavigation();
        initAddButtons();
        refreshUI();
    </script>
</body>
</html>
